<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ report_title }} - GoatOS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; color: #333; }
        .report-header { border-bottom: 3px solid #4CAF50; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
        .report-title { font-size: 2em; margin: 0; color: #2c3e50; }
        .report-subtitle { color: #666; font-size: 0.9em; margin-top: 5px; }
        .print-btn { background: #2196F3; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .print-btn:hover { background: #1976D2; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; background: #f5f5f5; padding: 10px; border-bottom: 2px solid #ddd; font-size: 0.9em; color: #555; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .stat-row { display: flex; gap: 30px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-box { background: #f8f9fa; padding: 15px 25px; border-radius: 8px; border: 1px solid #e1e4e8; text-align: center; }
        .stat-val { font-size: 2em; font-weight: bold; color: #2c3e50; }
        .stat-label { font-size: 0.8em; color: #666; text-transform: uppercase; }
        .section-title { font-size: 1.3em; color: #2c3e50; border-bottom: 2px solid #e1e4e8; padding-bottom: 8px; margin-top: 30px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .status-dot.Healthy { background: #4CAF50; }
        .status-dot.Sick { background: #e53935; }
        .status-dot.Vet { background: #FF9800; }
        .status-dot.Deceased { background: #616161; }
        .footer { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 10px; font-size: 0.85em; color: #999; }
        @media print {
            .print-btn { display: none; }
            body { padding: 0; }
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="report-header">
        <div>
            <h1 class="report-title">{{ report_title }}</h1>
            <div class="report-subtitle">{{ farm_settings.name }} &mdash; Generated {% now "F j, Y" %}</div>
        </div>
        <button class="print-btn" onclick="window.print()">Print Report</button>
    </div>

    {% block report_content %}{% endblock %}

    <div class="footer">GoatOS Farm Management &mdash; Printed {% now "F j, Y g:i A" %}</div>
</body>
</html>
