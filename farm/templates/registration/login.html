<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GoatOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 2rem;
        }
        .login-card .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .login-card label {
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }
        .login-card input[type="text"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .login-card input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.3);
        }
        .login-card button[type="submit"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-card button[type="submit"]:hover {
            background: #388E3C;
        }
        .error-list {
            background: #c62828;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            list-style: none;
        }
        .error-list li {
            color: #fff;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>GoatOS</h1>
        <p class="subtitle">Sign in to your farm</p>

        {% if form.errors %}
            <ul class="error-list">
                <li>Invalid username or password. Please try again.</li>
            </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" autofocus required>

            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required>

            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
